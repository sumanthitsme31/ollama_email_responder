version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_responder
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # You can add more env vars (e.g., WEBHOOK_URL) via a .env file later.
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_responder_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --proxy=off http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_responder
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_responder_net
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s

volumes:
  n8n_data:
  ollama_data:

networks:
  ai_responder_net:
    driver: bridge
